engine:
  volume_ratio: 1.5
  volume_ma_period: 20
  dtw_window: 20
  dtw_default_threshold: 0.3
  dtw_percentile: 10
  dtw_min_matches: 5
  rule_expire_days: 30
  top_n_patterns: 10
  min_occurrences: 3

dtw_bottom_templates:
  V: [-1, -0.5, 0, 0.5, 1]
  W: [-1, 0, -0.5, 0, 0.5, 1]

dtw_top_templates:
  INVERSE_V: [1, 0.5, 0, -0.5, -1]
  M_TOP: [1, 0.3, 0.8, 0.2, 0.6, 0]

